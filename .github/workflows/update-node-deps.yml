name: Update Node dependencies (daily)

on:
  schedule:
    # Runs daily at 02:00 UTC, which is 12:00 or 13:00 Melbourne time
    # depending on daylight-saving time.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-node-deps
  cancel-in-progress: true

jobs:
  update-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Update dependency versions
        run: |
          set -euo pipefail

          # Update dependency ranges in package.json, including new major versions.
          npx --yes npm-check-updates@latest --upgrade

          # Regenerate package-lock.json and install the updated dependencies.
          npm install

      - name: Install Playwright browsers and system dependencies
        run: npx playwright install --with-deps

      - name: Run tests
        run: npx playwright test

      - name: Commit and push dependency updates
        shell: bash
        env:
          GH_PAT: ${{ secrets.ACTIONS_PUSH_PAT }}
        run: |
          set -euo pipefail

          git config user.name "agray"
          git config user.email "agray@users.noreply.github.com"

          git add -- package.json package-lock.json

          if git diff --cached --quiet; then
            echo "No Node dependency updates were found."
            exit 0
          fi

          echo "Dependency changes:"
          git diff --cached --stat
          git diff --cached -- package.json

          git commit -m "Update Node dependencies"

          # Incorporate any commit pushed to main while this workflow was running.
          git pull \
            --rebase \
            "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git" \
            main

          git push \
            "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git" \
            HEAD:main

          echo "Node dependency updates were committed and pushed to main."